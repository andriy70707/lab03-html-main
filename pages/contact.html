<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Контакти" />
  <title>Контакти</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="../styles/responsive.css">

  <!-- JS -->
  <script src="../js/main.js" defer></script>
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container">

      <!-- КНОПКА ТЕМИ -->
      <button id="themeBtn">🌙</button>

      <nav>
        <ul class="nav-list">
          <li><a href="../index.html">Головна</a></li>
          <li><a href="./about.html">Про мене</a></li>
          <li><a href="./contact.html">Контакти</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="container">

    <section class="section card">
      <h1>Контакти</h1>

      <!-- 🔥 ВАЖЛИВО -->
      <form id="contact-form">

        <h2>Зв’яжіться зі мною</h2>

        <div class="form-group">
          <label for="name">Ім’я:</label>
          <input id="name" name="name" type="text" required minlength="2" />
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input id="email" name="email" type="email" required />
        </div>

        <div class="form-group">
          <label for="phone">Телефон:</label>
          <input id="phone" name="phone" type="tel" placeholder="+380..." />
        </div>

        <div class="form-group">
          <label for="topic">Тема:</label>
          <select id="topic" name="topic">
            <option value="study">Навчання</option>
            <option value="work">Співпраця</option>
            <option value="other">Інше</option>
          </select>
        </div>

        <fieldset class="form-group">
          <legend>Спосіб зв’язку</legend>

          <label>
            <input type="radio" name="contactWay" value="email" checked />
            Email
          </label>

          <label>
            <input type="radio" name="contactWay" value="phone" />
            Телефон
          </label>
        </fieldset>

        <div class="form-group">
          <label for="message">Повідомлення:</label>
          <textarea id="message" name="message" rows="5" maxlength="500"></textarea>

          <!-- 🔥 ЛІЧИЛЬНИК -->
          <small id="charCount">0 / 500</small>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" name="agree" required />
            Погоджуюсь з правилами
          </label>
        </div>

        <button type="submit">Надіслати</button>

      </form>

      <!-- 🔥 ВИВІД РЕЗУЛЬТАТУ -->
      <div id="formResult"></div>

    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span></p>
    </div>
  </footer>

  <!-- 🔥 КНОПКА ВГОРУ -->
  <button id="topBtn">↑</button>

</body>
</html>
